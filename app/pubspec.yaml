name: pannaipuram
description: பண்ணைப்புரம் — உங்கள் ஊரின் தகவல் மையம்
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  # flutter_local_notifications: ^18.0.0  # TODO: add back when implementing foreground notifications

  # URL launcher (for one-tap calls)
  url_launcher: ^6.3.0

  # Intl (date/time formatting in Tamil)
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansTamil-Medium.ttf
          weight: 500
